<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MesaRun!</title>

    <!-- Tailwind CSS (via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fontes do Google -->
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <!-- Import Map para o motor Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body class="bg-gray-900 text-white overflow-hidden touch-none flex items-center justify-center min-h-screen selection:bg-transparent">

    <!-- Wrapper principal -->
    <div id="game-wrapper" class="w-full max-w-[100vh] h-screen relative overflow-hidden bg-gray-950 shadow-2xl border-x border-white/5">

        <!-- Interface (Menus e Pontuação) -->
        <div id="ui-layer" class="absolute inset-0 z-10 select-none flex items-center justify-center">

            <!-- Camada de Fundo com Blur Reduzido (sm) -->
            <div id="menu-backdrop" class="absolute inset-0 bg-black/55 backdrop-blur-sm flex flex-col items-center justify-center transition-opacity duration-500 z-20">

                <!-- Camada de Fundo com Blur Reduzido (sm) -->
            <div id="menu-backdrop" class="absolute inset-0 glass-backdrop flex flex-col items-center justify-between py-12 transition-opacity duration-500 z-20">

                <!-- Logos no Topo (Cabeçalho Centralizado) -->
                <div id="top-logos" class="flex flex-col items-center gap-3 pointer-events-none z-30">
                    <img src="logo.png" alt="Logo Sesc" class="h-10 object-contain drop-shadow-md">
                    <img src="assets/sprite/cartoon/Home.png" alt="MesaRun - Léo e Lucas" class="block mx-auto h-48 md:h-56 w-auto object-contain drop-shadow-2xl">
                </div>

                <!-- Menu Principal (Posicionado de forma inteligente no terço inferior) -->
                <div id="main-menu" class="flex flex-col items-center w-full max-w-[310px] px-4 gap-3 z-30 justify-center mb-6">

                    <!-- Botão Play -->
                    <button id="btn-play" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-[Bangers] text-4xl tracking-wide py-3 rounded-2xl border-4 border-slate-950 shadow-[4px_4px_0px_#020617] active:translate-y-[4px] active:shadow-none transition-all duration-100">
                        PLAY
                    </button>

                    <!-- Botões Auxiliares -->
                    <div class="grid grid-cols-2 gap-3 w-full">
                        <button id="btn-ranking" class="bg-amber-500 hover:bg-amber-400 text-white font-bold text-xs py-2.5 rounded-xl border-4 border-slate-950 shadow-[3px_3px_0px_#020617] active:translate-y-[3px] active:shadow-none transition-all duration-100">
                            🏆 RANKING
                        </button>
                        <button id="btn-settings" class="bg-slate-600 hover:bg-slate-500 text-white font-bold text-xs py-2.5 rounded-xl border-4 border-slate-950 shadow-[3px_3px_0px_#020617] active:translate-y-[3px] active:shadow-none transition-all duration-100">
                            ⚙️ AJUSTES
                        </button>
                    </div>
                </div>
                
                <!-- Modal do Ranking -->
                <div id="ranking-modal" class="hidden flex-col items-center w-[290px] bg-slate-900/95 border-4 border-slate-950 rounded-3xl p-5 shadow-2xl relative z-40 pb-[18vh]">
                    <!-- Botão de Fechar no topo -->
                    <button id="btn-close-ranking-x" class="absolute top-4 right-4 text-slate-500 hover:text-white transition-colors">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>

                    <h2 class="font-[Bangers] text-4xl text-white tracking-wide mb-3">🏆 TOP 10</h2>

                    <ul id="ranking-list" class="w-full text-white font-semibold space-y-1.5 mb-4 max-h-36 overflow-y-auto pr-1">
                        <!-- Preenchido dinamicamente -->
                    </ul>

                    <button id="btn-close-ranking" class="w-full bg-red-500 hover:bg-red-400 text-white font-bold py-2 rounded-xl border-2 border-slate-950 shadow-[3px_3px_0px_#020617] active:translate-y-[3px] active:shadow-none transition-all duration-100 text-sm">
                        VOLTAR
                    </button>

                    <!-- Lucas Maior e Centralizado -->
                    <img src="assets/sprite/cartoon/ranking.png" alt="Lucas troféu" class="absolute bottom-0 left-1/2 -translate-x-1/2 h-[18vh] object-contain pointer-events-none select-none align-bottom z-10">
                </div>

                <!-- Rodapé -->
                <div id="footer" class="absolute bottom-2 left-0 right-0 flex flex-col items-center pointer-events-none z-10">
                    <p class="text-[10px] font-semibold text-slate-500">
                        Powered with <span class="text-red-500 text-xs">&#10084;</span> by <strong class="text-slate-300">Mesaque</strong>
                    </p>
                </div>
            </div>

            <!-- Tela de Contagem -->
            <div id="countdown-layer" class="hidden absolute inset-0 pointer-events-none z-30 opacity-0">
                <h1 id="countdown-text" class="hidden">3</h1>
            </div>

            <!-- HUD SUPERIOR -->
            <div id="top-hud-container" class="absolute top-2 left-2 right-2 md:top-4 md:left-4 md:right-4 flex items-center justify-between gap-2 z-30 pointer-events-none">
                <!-- Velocímetro -->
                <div id="speedometer-layer" class="hidden bg-slate-950/85 backdrop-blur-md rounded-xl py-1 px-3 flex items-center gap-1.5 border border-white/5 shadow-lg pointer-events-auto">
                    <svg class="w-4 h-4 stroke-emerald-400 stroke-[2.5] fill-none" viewBox="0 0 24 24"><path stroke="none" d="M0 0h24v24H0z"/><path d="M5.636 19.364a9 9 0 1 1 12.728 0" /><path d="M16 9l-4 4" /></svg>
                    <span id="speed-text" class="font-[Bangers] text-lg md:text-xl text-white tracking-wide">0 km/h</span>
                </div>
                <!-- Doações -->
                <div id="score-layer" class="hidden bg-slate-950/85 backdrop-blur-md rounded-xl py-1 px-3 flex items-center gap-1.5 border border-white/5 shadow-lg pointer-events-auto">
                    <svg class="w-4 h-4 stroke-amber-400 stroke-[2.5] fill-none" viewBox="0 0 24 24"><path stroke="none" d="M0 0h24v24H0z"/><path d="M12 3l8 4.5v9l-8 4.5l-8 -4.5v-9z" /><path d="M12 12l8 -4.5" /></svg>
                    <span id="score-text" class="font-[Bangers] text-lg md:text-xl text-white tracking-wide">0 kg</span>
                </div>
                <!-- Freios -->
                <div id="hud-layer" class="hidden bg-slate-950/85 backdrop-blur-md rounded-xl py-1 px-2.5 flex items-center gap-1.5 border border-white/5 shadow-lg pointer-events-auto">
                    <img id="brake-icon-1" src="assets/sprite/road/freio.png" alt="B1" class="w-5 h-5 object-contain transition-all duration-300">
                    <img id="brake-icon-2" src="assets/sprite/road/freio.png" alt="B2" class="w-5 h-5 object-contain transition-all duration-300">
                    <img id="brake-icon-3" src="assets/sprite/road/freio.png" alt="B3" class="w-5 h-5 object-contain transition-all duration-300">
                </div>
            </div>

            <!-- NOVAS SIRENES DE PISTA (Tabler Icons SVG) -->
            <div id="warning-siren-0" class="hidden absolute left-[32%] top-[45%] -translate-x-1/2 -translate-y-1/2 z-20 pointer-events-none">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="#ef4444" stroke="#020617" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="drop-shadow-lg"><path d="M12 1.67a1.9 1.9 0 0 0-1.7.97l-9.8 17a1.9 1.9 0 0 0 1.7 2.86h19.6a1.9 1.9 0 0 0 1.7-2.86l-9.8-17a1.9 1.9 0 0 0-1.7-.97z"></path><line x1="12" y1="9" x2="12" y2="13" stroke="#ffffff" stroke-width="3"></line><line x1="12" y1="17" x2="12.01" y2="17" stroke="#ffffff" stroke-width="3"></line></svg>
            </div>
            <div id="warning-siren-1" class="hidden absolute left-[50%] top-[45%] -translate-x-1/2 -translate-y-1/2 z-20 pointer-events-none">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="#ef4444" stroke="#020617" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="drop-shadow-lg"><path d="M12 1.67a1.9 1.9 0 0 0-1.7.97l-9.8 17a1.9 1.9 0 0 0 1.7 2.86h19.6a1.9 1.9 0 0 0 1.7-2.86l-9.8-17a1.9 1.9 0 0 0-1.7-.97z"></path><line x1="12" y1="9" x2="12" y2="13" stroke="#ffffff" stroke-width="3"></line><line x1="12" y1="17" x2="12.01" y2="17" stroke="#ffffff" stroke-width="3"></line></svg>
            </div>
            <div id="warning-siren-2" class="hidden absolute left-[68%] top-[45%] -translate-x-1/2 -translate-y-1/2 z-20 pointer-events-none">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="#ef4444" stroke="#020617" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="drop-shadow-lg"><path d="M12 1.67a1.9 1.9 0 0 0-1.7.97l-9.8 17a1.9 1.9 0 0 0 1.7 2.86h19.6a1.9 1.9 0 0 0 1.7-2.86l-9.8-17a1.9 1.9 0 0 0-1.7-.97z"></path><line x1="12" y1="9" x2="12" y2="13" stroke="#ffffff" stroke-width="3"></line><line x1="12" y1="17" x2="12.01" y2="17" stroke="#ffffff" stroke-width="3"></line></svg>
            </div>

            <!-- NOVO DIÁLOGO CARTOON (Estrutura Flexível) -->
            <!-- Use a classe 'flex-row' para Lucas e 'flex-row-reverse' para o Léo via JS -->
            <div id="toast-layer" class="hidden absolute bottom-0 left-0 right-0 z-30 pointer-events-none flex-row items-end px-3 pb-0">
                
                <!-- Container da Imagem (Maior e colado ao fundo) -->
                <div class="w-[35%] h-[28vh] flex items-end shrink-0 z-10">
                    <img id="toast-char-img" src="assets/sprite/cartoon/lucas1.png" alt="Personagem" class="h-full w-full object-contain object-bottom pointer-events-auto select-none breathing-anim">
                </div>

                <!-- Balão de Fala -->
                <div class="w-[65%] mb-[6vh] flex pointer-events-auto px-1">
                    <div id="toast-balloon" class="bg-white text-slate-900 border-4 border-slate-950 rounded-2xl py-3 px-3 shadow-[3px_3px_0px_#020617] relative w-full">
                        <!-- A seta é controlada por CSS: toast-arrow-left ou toast-arrow-right -->
                        <div id="toast-arrow" class="toast-arrow-left"></div>
                        <p id="toast-text" class="font-bold text-[12px] md:text-sm leading-tight tracking-wide"></p>
                    </div>
                </div>

            </div>

            <!-- Modal de Game Over -->
            <div id="game-over-modal" class="hidden flex-col items-center w-[290px] bg-slate-900/95 border-4 border-slate-950 rounded-3xl p-5 shadow-2xl z-30 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pb-[16vh]">
                <h2 class="font-[Bangers] text-4xl text-white tracking-wide mb-1.5">💥 BATIDA!</h2>
                <p class="text-slate-300 text-xs mb-3 text-center">O caminhão colidiu com um obstáculo!</p>

                <div class="text-center mb-3 bg-slate-950/40 w-full py-2 rounded-2xl border border-white/5">
                    <p class="text-[9px] text-slate-400 uppercase tracking-widest font-bold mb-0.5">Doações Coletadas</p>
                    <span id="game-over-score" class="font-[Bangers] text-4xl text-emerald-400 tracking-wide">0 kg</span>
                </div>

                <!-- Form Recorde -->
                <div id="record-form" class="hidden w-full flex-col gap-1.5 mb-3">
                    <p class="text-[10px] text-emerald-400 font-bold text-center">🏆 Novo Recorde! Digite seu nome:</p>
                    <input id="player-name-input" type="text" maxlength="15" placeholder="Seu Nome" class="w-full bg-slate-950 border border-slate-700 rounded-lg py-1.5 px-2 text-white text-center font-bold focus:outline-none focus:border-emerald-500 transition-all text-xs">
                    <button id="btn-save-record" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-1.5 rounded-lg border border-slate-950 shadow-[1px_1px_0px_#020617] active:translate-y-[1px] active:shadow-none transition-all text-xs">
                        SALVAR
                    </button>
                </div>

                <!-- Ações -->
                <div class="flex flex-col gap-2 w-full">
                    <button id="btn-restart" class="w-full bg-slate-100 hover:bg-white text-slate-900 font-bold py-2 rounded-xl border-2 border-slate-950 shadow-[3px_3px_0px_#020617] active:translate-y-[3px] active:shadow-none transition-all duration-100 text-xs">
                        TENTAR NOVAMENTE
                    </button>
                    <button id="btn-back-menu" class="w-full bg-slate-600 hover:bg-slate-500 text-white font-bold py-2 rounded-xl border-2 border-slate-950 shadow-[3px_3px_0px_#020617] active:translate-y-[3px] active:shadow-none transition-all duration-100 text-xs">
                        MENU PRINCIPAL
                    </button>
                </div>

                <!-- Léo Maior e Centralizado -->
                <img src="assets/sprite/cartoon/over.png" alt="Léo Triste" class="absolute bottom-0 left-1/2 -translate-x-1/2 h-[18vh] object-contain pointer-events-none select-none align-bottom z-10">
            </div>

            <!-- Modal de Configurações -->
            <div id="settings-modal" class="hidden flex-col items-center w-[290px] bg-slate-900/95 border-4 border-slate-950 rounded-3xl p-5 shadow-2xl z-30 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pb-[16vh]">
                <!-- Botão de Fechar no topo -->
                <button id="btn-close-settings-x" class="absolute top-4 right-4 text-slate-500 hover:text-white transition-colors">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>

                <h2 class="font-[Bangers] text-3xl text-white tracking-wide mb-3">⚙️ AJUSTAR CÂMERA</h2>
                <p class="text-[10px] text-slate-300 text-center mb-3 leading-relaxed">Escolha o ângulo de visão do caminhão.</p>

                <div class="flex flex-col gap-2 w-full mb-4">
                    <button id="btn-cam-isometric" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-1.5 rounded-lg border border-slate-950 shadow-[2px_2px_0px_#020617] active:translate-y-[2px] active:shadow-none transition-all text-[10px]">
                        DIAGONAL RETRÔ
                    </button>
                    <button id="btn-cam-topdown" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-1.5 rounded-lg border border-slate-950 shadow-[2px_2px_0px_#020617] active:translate-y-[2px] active:shadow-none transition-all text-[10px]">
                        VISÃO DE CIMA
                    </button>
                    <button id="btn-cam-chase" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-1.5 rounded-lg border border-slate-950 shadow-[2px_2px_0px_#020617] active:translate-y-[2px] active:shadow-none transition-all text-[10px]">
                        CÂMERA DE AÇÃO
                    </button>
                </div>

                <button id="btn-close-settings" class="w-full bg-red-500 hover:bg-red-400 text-white font-bold py-2 rounded-xl border-4 border-slate-950 shadow-[3px_3px_0px_#020617] active:translate-y-[3px] active:shadow-none transition-all duration-100 text-xs">
                    CONFIRMAR
                </button>

                <!-- Léo Maior e Centralizado -->
                <img src="assets/sprite/cartoon/config.png" alt="Léo Config" class="absolute bottom-0 left-1/2 -translate-x-1/2 h-[18vh] object-contain pointer-events-none select-none align-bottom z-10">
            </div>

        </div>

        <!-- Container do Three.js -->
        <div id="game-container" class="absolute inset-0 z-0"></div>

    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
