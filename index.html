<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MesaRun!</title>
    
    <!-- Tailwind CSS (via CDN para o Front-end 0800) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonte Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Import Map para o motor Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body class="bg-gray-900 text-white overflow-hidden touch-none">
    
    <!-- Camada de Interface (UI) - Vai ficar por cima do jogo 3D -->
    <div id="ui-layer" class="absolute inset-0 pointer-events-none z-10 flex flex-col items-center justify-center">
        <h1 id="loading-text" class="text-3xl font-extrabold text-yellow-400 drop-shadow-lg tracking-wider animate-pulse">
            LIGANDO O MOTOR 3D...
        </h1>
    </div>

    <!-- O Container onde o Three.js vai injetar o nosso Canvas -->
    <div id="game-container" class="absolute inset-0 z-0"></div>

    <!-- Script Principal (como module para suportar imports) -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
