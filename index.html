<!DOCTYPE html>
<html lang="pt-BR" class="h-full w-full overflow-hidden select-none">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sesc Mesa Brasil - MesaRun!</title>
    
    <!-- Tailwind CSS para estilização rápida -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuração do Tailwind para usar a fonte Plus Jakarta Sans -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Engines gráficas do jogo (carregamento local para evitar falhas de CDN) -->
    <script src="assets/vendor/pixi.min.js"></script>
    <script src="assets/vendor/pixi3d.js"></script>
    <script>
       window.addEventListener("DOMContentLoaded", () => {
           if (typeof PIXI === "undefined" || typeof PIXI3D === "undefined") {
               console.error("[Boot] PIXI ou PIXI3D não foram carregados corretamente.");
               document.body.insertAdjacentHTML("beforeend", '<div style="position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#020617; color:#fff; font-family:Arial,sans-serif; z-index:9999;">Falha ao carregar o motor gráfico do MesaRun.</div>');
           }
       });
    </script>

    <!-- Ícones Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="h-full w-full bg-slate-950 text-white overflow-hidden font-sans flex items-center justify-center">

    <!-- Contêiner Principal do Jogo (Garante proporção responsiva) -->
    <div id="game-container" class="relative w-full h-full max-w-md md:max-h-[800px] md:rounded-2xl md:shadow-2xl overflow-hidden aspect-[9/16] bg-slate-900">
        
        <!-- Canvas do PixiJS (Injetado dinamicamente via JS) -->
        <div id="canvas-holder" class="absolute inset-0 w-full h-full z-0"></div>

        <!-- Camada 2D de Interface do Usuário (HUD e Menus) -->
        <div id="ui-layer" class="absolute inset-0 z-10 flex flex-col justify-between pointer-events-none p-4">
            
            <!-- HUD (Placar e Painel Superior) - Visível durante o gameplay -->
            <div id="hud" class="hidden w-full flex justify-between items-center transition-opacity duration-300 pointer-events-auto">
                <!-- Informações do Jogador Selecionado -->
                <div class="flex items-center gap-2 bg-slate-900/85 backdrop-blur-md px-3 py-1.5 rounded-full border border-slate-700/50">
                    <i data-lucide="user" class="w-4 h-4 text-emerald-400"></i>
                    <span id="hud-player-name" class="text-xs font-semibold tracking-wide truncate max-w-[120px]">Motorista</span>
                </div>
                <!-- Pontuação -->
                <div class="bg-slate-900/85 backdrop-blur-md px-4 py-1.5 rounded-full border border-slate-700/50 flex items-center gap-2">
                    <span class="text-xs text-slate-400 font-bold uppercase tracking-wider">Pontos:</span>
                    <span id="hud-score" class="text-emerald-400 font-extrabold text-lg leading-none">0</span>
                </div>
            </div>

            <!-- TELA DE LOGIN / SELEÇÃO DE JOGADOR (Início) -->
            <div id="screen-login" class="flex flex-col justify-center items-center h-full w-full pointer-events-auto gap-6 bg-slate-950/90 backdrop-blur-sm">
                <div class="text-center space-y-2">
                    <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-emerald-400 to-teal-400 bg-clip-text text-transparent">MesaRun!</h1>
                    <p class="text-xs text-slate-400">Selecione seu perfil para iniciar a rota</p>
                </div>
                
                <!-- Lista de seleção de usuários carregados da Planilha -->
                <div class="w-full max-w-xs space-y-3">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider">Identifique-se:</label>
                    <div class="relative">
                        <select id="player-select" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 appearance-none cursor-pointer">
                            <option value="">Carregando motoristas...</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                            <i data-lucide="chevron-down" class="w-4 h-4"></i>
                        </div>
                    </div>
                    <button id="btn-start" disabled class="w-full bg-emerald-600 hover:bg-emerald-500 disabled:bg-slate-800 disabled:text-slate-500 transition-colors py-3 rounded-lg font-bold text-sm shadow-lg shadow-emerald-900/20">
                        Iniciar Entrega
                    </button>
                </div>
            </div>

            <!-- TELA DE GAME OVER -->
            <div id="screen-gameover" class="hidden flex flex-col justify-center items-center h-full w-full pointer-events-auto gap-6 bg-slate-950/95 backdrop-blur-md">
                <div class="text-center space-y-2 animate-bounce">
                    <div class="inline-flex p-3 bg-red-500/10 rounded-full border border-red-500/20 text-red-500 mb-2">
                        <i data-lucide="alert-triangle" class="w-8 h-8"></i>
                    </div>
                    <h2 class="text-2xl font-extrabold text-red-500">Entrega Interrompida</h2>
                    <p class="text-xs text-slate-400">O caminhão sofreu uma colisão no trânsito!</p>
                </div>

                <!-- Painel de Resultados -->
                <div class="w-full max-w-xs bg-slate-900/50 border border-slate-800 rounded-xl p-5 space-y-4">
                    <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                        <span class="text-xs font-semibold text-slate-400">Sua Pontuação:</span>
                        <span id="final-score" class="text-lg font-extrabold text-emerald-400">0</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-semibold text-slate-400">Melhor Pontuação:</span>
                        <span id="best-score" class="text-sm font-bold text-slate-200">0</span>
                    </div>
                    <!-- Status do Upload para Planilha -->
                    <div id="upload-status" class="text-center text-[10px] text-slate-500 italic">
                        Salvando pontuação na nuvem...
                    </div>
                </div>

                <!-- Botões de Ação -->
                <div class="w-full max-w-xs flex gap-3">
                    <button id="btn-restart" class="flex-1 bg-emerald-600 hover:bg-emerald-500 transition-colors py-3 rounded-lg font-bold text-sm flex items-center justify-center gap-2">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Tentar Novamente
                    </button>
                </div>
            </div>

        </div>

        <!-- Overlay de Efeito Splat (Feedback Visual de Colisão com Itens Ruins) -->
        <div id="splat-overlay" class="absolute inset-0 pointer-events-none bg-lime-500/0 transition-all duration-300 z-20 flex items-center justify-center">
            <!-- Balão de Toast flutuante para mensagens negativas -->
            <div id="toast-message" class="opacity-0 transform translate-y-4 transition-all duration-300 bg-slate-950/90 text-red-400 border border-red-500/30 px-4 py-2.5 rounded-full text-xs font-bold tracking-wide shadow-xl flex items-center gap-2">
                <i data-lucide="frown" class="w-4 h-4 text-red-400"></i>
                <span id="toast-text">Leite Azedo! -10 pontos</span>
            </div>
        </div>

    </div>

    <!-- Scripts do Jogo (Carregados na ordem correta de execução) -->
    <script src="js/api.js" defer></script>
    <script src="js/engine.js" defer></script>
    <script src="js/world.js" defer></script>
    <script src="js/entities.js" defer></script>
    <script src="js/main.js" defer></script>

</body>
</html>
